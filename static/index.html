<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ACS Auto SIT</title>
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <header class="app-header">
      <div>
        <h1>ACS Auto SIT</h1>
        <p>3DS 瀏覽器 AReq / CReq POST 測試工具</p>
      </div>
      <div id="status" class="status-pill">待命</div>
    </header>

    <nav class="tab-bar" aria-label="Workspace tabs">
      <button class="tab-button active" type="button" data-tab="manualRunner">手動交易</button>
      <button class="tab-button" type="button" data-tab="sitRunner">SIT 測試</button>
    </nav>

    <main id="manualRunner" class="workspace tab-panel active">
      <section class="panel input-panel">
        <div class="toolbar">
          <button id="sendAreq" class="primary" type="button">送出 AReq</button>
          <button id="sendCreq" type="button" disabled>送出 CReq</button>
        </div>

        <label>
          AReq URL
          <input id="areqUrl" spellcheck="false" value="https://acscloud-test.hitrust-us.com/acs-auth-v3/auth/M/220/0c57e472-e555-2c0a-e7cf-2d6a2455fbc8/123/areq" />
        </label>

        <label>
          CReq URL
          <input id="creqUrl" spellcheck="false" placeholder="由 ARes acsURL 帶入，也可手動貼上" />
        </label>

        <div class="split">
          <label>
            HTTP 標頭
            <textarea id="headers" spellcheck="false">{
  "Content-Type": "application/json"
}</textarea>
          </label>
          <label>
            逾時秒數
            <input id="timeoutSeconds" type="number" min="1" max="180" value="30" />
          </label>
        </div>

        <div class="options-row">
          <label class="check-label">
            <input id="autoSelectSms" type="checkbox" checked />
            自動選 SMS
          </label>
          <label class="check-label">
            <input id="autoSubmitOtp" type="checkbox" checked />
            自動送出 OTP
          </label>
          <label>
            模擬 OTP
            <input id="simulatedOtp" spellcheck="false" value="123456" />
          </label>
        </div>

          AReq JSON

  "acquirerBIN": "230230",

        </label>

        <label>
          CReq JSON
          <textarea id="creqPayload" class="large" spellcheck="false"></textarea>
        </label>
      </section>

      <section class="panel output-panel">
        <div class="result-grid">
          <label>
            ARes
            <textarea id="aresOutput" spellcheck="false" readonly></textarea>
          </label>
          <label>
            CRes
            <textarea id="cresOutput" spellcheck="false" readonly></textarea>
          </label>
          <label>
            通知結果
            <textarea id="notificationOutput" spellcheck="false" readonly></textarea>
          </label>
        </div>

        <label>
          HTTP 證據
          <textarea id="evidenceOutput" class="evidence" spellcheck="false" readonly></textarea>
        </label>
      </section>
    </main>

    <main id="sitRunner" class="sit-workspace tab-panel">
      <section class="panel case-panel">
        <div class="toolbar">
          <button id="runSelectedCases" class="primary" type="button">執行選取案例</button>
          <button id="runAllCases" type="button">全部執行</button>
        </div>
        <div class="case-tools">
          <label class="check-label">
            <input id="selectAllCases" type="checkbox" />
            全選
          </label>
          <span id="caseCount" class="case-count">0 個案例</span>
        </div>
        <div class="progress-box">
          <strong>案例編寫進度</strong>
          <span id="caseProgressSummary">尚未載入</span>
        </div>
        <div class="sit-options">
          <label>
            發卡行模式
            <select id="issuerMode">
              <option value="selection_sms_oob">有驗證選擇：SMS / OOB</option>
              <option value="selection_sms_otp">有驗證選擇：選 SMS 進 OTP</option>
              <option value="direct_otp">直接進 OTP</option>
              <option value="direct_oob">直接進 OOB</option>
              <option value="default_oob_can_switch_otp">預設 OOB，可切到 OTP</option>
            </select>
          </label>
          <label>
            優先驗證方式
            <select id="preferredChallenge">
              <option value="auto">自動</option>
              <option value="sms">SMS</option>
              <option value="oob">OOB</option>
              <option value="otp">OTP</option>
            </select>
          </label>
          <label>
            OTP 來源
            <select id="otpSourceMode">
              <option value="customer_generated">客戶產生 / 客戶驗證</option>
              <option value="acs_generated">ACS 產生 / ACS 驗證</option>
            </select>
          </label>
          <label>
            成功 OTP
            <input id="successOtp" spellcheck="false" value="123456" />
          </label>
          <label>
            失敗 OTP
            <input id="failureOtp" spellcheck="false" value="000000" />
          </label>
        </div>
        <div id="caseList" class="case-list"></div>
      </section>

      <section class="panel case-detail-panel">
        <div class="detail-header">
          <div>
            <h2 id="caseTitle">選擇案例</h2>
            <p id="caseSubtitle">瀏覽器 SIT 案例細節與執行結果</p>
          </div>
          <span id="caseStatus" class="case-status pending">待執行</span>
        </div>
        <div class="detail-grid">
          <label>
            步驟
            <textarea id="caseStepsOutput" spellcheck="false" readonly></textarea>
          </label>
          <label>
            預期結果
            <textarea id="caseExpectedOutput" spellcheck="false" readonly></textarea>
          </label>
        </div>
        <label>
          執行細節
          <textarea id="caseRunOutput" class="evidence" spellcheck="false" readonly></textarea>
        </label>
      </section>
    </main>

    <script src="/static/app.js"></script>
  </body>
</html>
